name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels: ['major']
  minor:
    labels:
      - 'minor'
      - 'breaking'
  patch:
    labels: ['patch']
  default: patch
categories:
  - title: '⚠️ Breaking Changes'
    labels:
      - 'breaking'
  - title: '🚀 Features'
    labels:
      - 'enhancement'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: '⚡ Performance'
    labels:
      - 'performance'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🧰 Maintenance & Refactoring'
    labels:
      - 'chore'
      - 'refactor'
      - 'ci'

exclude-labels:
  - 'skip-changelog'
  - 'wontfix'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'

template: |
  ## Changelog

  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
